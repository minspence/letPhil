<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comments and Console Log</title>
  </head>
  <body>
    <script>
      // This is a single-line comment

      /*
            This is a multi-line comment
            It can span multiple lines
        */

      // console.logging for debugging
      // console.log("Hello, World!"); // This will print "Hello, World!" to the console
      // console.warn("This is a warning!"); // This will print a warning message to the console
      // console.error("This is an error!"); // This will print an error message to the console

      // this is a single-line comment
      console.log("This is a message in the console.");

      /*
            this is a multi-line comment
            it gets ignored by javascript
        */
      console.warn("This is a warning message in the console.");
      console.error("This is an error message in the console.");
    </script>
  </body>
</html>
