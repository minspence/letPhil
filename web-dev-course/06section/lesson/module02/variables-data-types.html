<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variables and Data Types</title>
  </head>
  <body>
    <script>
      // var - old method of declaring variables, not recommended
      // let - modern way to declare variables, allows reassignment
      // const - declares constants, cannot be reassigned

      //Data Types
      // String - "this is a string"
      // number - 36, 3.14
      // boolean - true or false
      // array - list of values
      // object - collection of key-value pairs {name: "John", age: 30}
      // null - represents no value
      // undefined - variable declared but not assigned a value

      const name = "Alice"; // String
      const age = 30; // Number
      const isStudent = true; // Boolean
      const hobbies = ["reading", "gaming", "coding"]; // Array
      const person = { name: "Alice", age: 30 }; // Object

      console.log(name, age, isStudent, hobbies, person);
    </script>
  </body>
</html>
