<!-- declares the document as HTML5 -->
<!doctype html>
<!-- this the root element -->
<html lang="en">
  <!-- head tag includes metadata and title -->
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Learn HTML easily" />
    <meta name="keywords" content="HTML, CSS, Javascript" />
    <meta name="author" content="Minuit Spence" />
    <title>My Website</title>
  </head>
  <!-- body tag contains the visible content of the webpage -->
  <body>
    <!-- header tag h1 - h6 where h1 is largest and gets progressively smaller -->
    <h1>Main Heading (h1)</h1>
    <h2>Sub Heading (h2)</h2>
    <h3>Section Heading (h3)</h3>
    <h4>Smaller title Heading (h4)</h4>
    <h5>Minor Heading (h5)</h5>
    <h6>Smallest Heading (h6)</h6>
    <!-- p tag for description -->
    <p>this a paragraph tag (p)</p>
    <div style="background-color: lightgray; padding: 10px">
      <h3>Div section</h3>
      <p>This is a block level container using a "&lt; div &gt;" tag.</p>
    </div>
    <p>
      this text contains a
      <span style="color: red">highlighted word</span> using the "&lt; span
      &gt;" tag.
    </p>
  </body>
</html>
