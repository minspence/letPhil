<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adding Media</title>
  </head>
  <body>
    <!-- Images can be added using the <img> tag the src attribute specifies the path to the image file this can also be a URL. alt attribute provides alternative text for the image if the link is broken. -->
    <img src="image.jpg" alt="Description of image" width="300" />

    <!-- Audio can be added using the <audio> tag the src attribute specifies the path to the audio file this can also be a URL. controls attribute adds playback controls for the audio element. -->
    <audio controls>
      <source src="audio.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>

    <!-- Video can be added using the <video> tag the src attribute specifies the path to the video file this can also be a URL. controls attribute adds playback controls for the video element. -->
    <video controls width="400">
      <source src="video.mp4" type="video/mp4" />
      Your browser does not support the video element.
    </video>
  </body>
</html>
